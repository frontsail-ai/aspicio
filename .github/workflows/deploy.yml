# Builds the demo and deploys it to a Cloudflare Worker (Static Assets).
#   push → master : production deploy (`wrangler deploy`)
#   pull_request  : preview version with its own URL (`wrangler versions upload`)
#
# One-time setup:
#   1. Create a Cloudflare API token with the "Workers Scripts: Edit" permission.
#   2. Add repo secrets: CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID.
#   (No resource to pre-create — `wrangler deploy` creates the Worker on first run.)
name: Deploy demo (Cloudflare Workers)

on:
  push:
    branches: [master]
  pull_request:

# Supersede in-flight deploys for the same branch/PR.
concurrency:
  group: cf-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write # let wrangler-action record a GitHub deployment
  pull-requests: write # and comment the preview URL on PRs

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    # Fork PRs can't read secrets — skip them (no preview) instead of failing.
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build the demo
        run: bunx vp run @aspicio/demo#build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          # Name + assets dir come from wrangler.toml. Production on master; a
          # preview version (with its own URL) on pull requests.
          command: ${{ github.event_name == 'pull_request' && 'versions upload' || 'deploy' }}
