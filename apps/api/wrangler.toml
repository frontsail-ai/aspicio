# Cloudflare Worker for the Aspicio DXF API (/describe, /render).
name = "aspicio-api"
main = "src/index.ts"
compatibility_date = "2025-06-01"
preview_urls = true

# Per-IP rate limiting (token bucket at the edge). The limit applies to the
# DXF endpoints only — /health and / stay exempt.
[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 60, period = 60 }
