# Deploys the demo and the DXF API to Vercel.
#   push → master : production deploy + smoke tests against the public aliases
#   pull_request  : preview deploy; its URL is posted back as a sticky comment
#                   (preview URLs sit behind Vercel SSO — team eyes only)
#
# One-time setup:
#   1. Create the two Vercel projects (aspicio-demo, aspicio-api) — CLI-linked,
#      no git integration (CI is the only deployer).
#   2. Add repo secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID_DEMO,
#      VERCEL_PROJECT_ID_API. Until they exist this workflow skips itself.
name: Deploy

on:
  push:
    branches: [master]
  pull_request:

# Supersede in-flight deploys for the same branch/PR.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write # comment the preview URL on PRs
  issues: write # PR comments go through the issues API

jobs:
  deploy:
    name: Deploy ${{ matrix.target }}
    runs-on: ubuntu-latest
    # Fork PRs can't read secrets — the token check below skips them cleanly.
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: demo
            build: bunx vp run @aspicio/demo#build
            dir: apps/demo/dist
            project_secret: VERCEL_PROJECT_ID_DEMO
            alias: aspicio-demo.vercel.app
            marker: aspicio-preview
            label: "🚀 **Preview deployed**"
          - target: api
            build: >-
              bunx vp run -F @aspicio/core -F @aspicio/widget build &&
              bunx vp run @aspicio/api#build:vercel
            dir: apps/api/vercel-dist
            project_secret: VERCEL_PROJECT_ID_API
            alias: aspicio-api.vercel.app
            marker: aspicio-api-preview
            label: "🛠️ **API preview deployed**"
    steps:
      - name: Note skip when Vercel secrets are absent
        if: env.VERCEL_TOKEN == ''
        run: echo "VERCEL_TOKEN not configured — skipping Vercel deploy."

      - uses: actions/checkout@v4
        if: env.VERCEL_TOKEN != ''

      - uses: oven-sh/setup-bun@v2
        if: env.VERCEL_TOKEN != ''
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v4
        if: env.VERCEL_TOKEN != ''
        with:
          node-version: 24

      - name: Install dependencies
        if: env.VERCEL_TOKEN != ''
        run: bun install --frozen-lockfile

      - name: Build
        if: env.VERCEL_TOKEN != ''
        run: ${{ matrix.build }}

      - name: Deploy to Vercel
        if: env.VERCEL_TOKEN != ''
        id: deploy
        env:
          VERCEL_PROJECT_ID: ${{ secrets[matrix.project_secret] }}
          PROD_FLAG: ${{ github.event_name == 'push' && '--prod' || '' }}
        run: |
          URL=$(bunx vercel deploy $PROD_FLAG --yes --cwd "${{ matrix.dir }}" --token "$VERCEL_TOKEN")
          echo "Deployed: $URL"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      # Production smoke runs against the public alias — deployment-scoped
      # URLs (and previews) sit behind Vercel Authentication.
      - name: Smoke test (api)
        if: env.VERCEL_TOKEN != '' && matrix.target == 'api' && github.event_name == 'push'
        run: |
          URL="https://${{ matrix.alias }}"
          curl -sf "$URL/health" | grep -q '"status": *"ok"'
          curl -sf "$URL/openapi.json" | grep -q '"openapi"'
          curl -sf -X POST "$URL/mcp" \
            -H "content-type: application/json" \
            -H "accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"smoke","version":"0"}}}' \
            | grep -q '"aspicio"'
          echo "API smoke passed."

      - name: Smoke test (demo)
        if: env.VERCEL_TOKEN != '' && matrix.target == 'demo' && github.event_name == 'push'
        run: |
          URL="https://${{ matrix.alias }}"
          curl -sf "$URL/" | grep -qi "aspicio"
          curl -sf "$URL/llms.txt" | grep -q "Aspicio"
          echo "Demo smoke passed."

      # Post (and keep updating) one sticky PR comment per target.
      - name: Comment the preview URL on the PR
        if: env.VERCEL_TOKEN != '' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          MARKER: ${{ matrix.marker }}
          LABEL: ${{ matrix.label }}
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            const marker = `<!-- ${process.env.MARKER} -->`;
            const sha = context.sha.slice(0, 7);
            const url = process.env.DEPLOY_URL;
            const body = url
              ? `${marker}\n${process.env.LABEL} for \`${sha}\`: ${url} (Vercel login required)`
              : `${marker}\n⚠️ Preview deployed for \`${sha}\`, but no URL was captured.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
