name: Publish to npm

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.0)"
        required: true
      dry_run:
        description: "Dry run (build and pack, publish nothing)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: Gate, version, publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          case "$VERSION" in
            [0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Invalid version: $VERSION"; exit 1 ;;
          esac
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing $VERSION"

      - name: Gate — format, lint, type-check
        run: bunx vp check

      - name: Gate — unit tests
        run: bunx vp run -r test

      - name: Set package versions
        # npm version trips over the root devEngines (bun) declaration;
        # stamp the manifests with bun directly instead. The workspace:^
        # dependency is replaced explicitly: bun publish would rewrite it
        # from the (stale, pre-stamp) lockfile — that shipped react@0.1.0
        # depending on core@^0.0.0.
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          bun -e '
            for (const path of ["packages/core/package.json", "packages/react/package.json"]) {
              const pkg = await Bun.file(path).json();
              pkg.version = process.env.VERSION;
              for (const deps of [pkg.dependencies, pkg.peerDependencies]) {
                for (const name of Object.keys(deps ?? {})) {
                  if (deps[name].startsWith("workspace:")) deps[name] = `^${process.env.VERSION}`;
                }
              }
              await Bun.write(path, JSON.stringify(pkg, null, 2) + "\n");
            }
            console.log("stamped", process.env.VERSION);
          '

      - name: Verify packed dependency ranges
        run: |
          cd packages/react && bun pm pack --destination /tmp/verify --quiet
          RANGE=$(tar -xzOf /tmp/verify/*.tgz package/package.json | bun -e '
            const pkg = await new Response(Bun.stdin.stream()).json();
            console.log(pkg.dependencies["@aspicio/core"]);
          ')
          echo "packed @aspicio/core range: $RANGE"
          test "$RANGE" = "^${{ steps.version.outputs.version }}" || { echo "workspace protocol leaked into the tarball"; exit 1; }

      - name: Build all packages
        run: bunx vp run -r build

      # bun publish reads NPM_CONFIG_TOKEN (it ignores ~/.npmrc), and wants a
      # token even for --dry-run — hence the placeholder fallback.
      - name: Publish @aspicio/core
        run: bun publish --access public ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}
        working-directory: packages/core
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN || 'dry-run-placeholder' }}

      - name: Publish @aspicio/react
        run: bun publish --access public ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}
        working-directory: packages/react
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN || 'dry-run-placeholder' }}
