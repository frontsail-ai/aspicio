# Cloudflare Workers (Static Assets) config for the Aspicio demo.
#
# Assets-only: there is no `main` entry script, so nothing runs server-side —
# the built files are served straight from Cloudflare's edge, exactly like a
# static host. Deployed by .github/workflows/deploy.yml via `wrangler deploy`.
name = "aspicio"
compatibility_date = "2025-06-01"
# Give each uploaded version a preview URL, so pull-request deploys
# (`wrangler versions upload`) get a shareable link the workflow posts back.
preview_urls = true

[assets]
directory = "apps/demo/dist"
